name: עדכון טבלת מונדיאל

on:
  # טריגר חיצוני אמין (cron-job.org וכו') שקורא ל-API של GitHub.
  # זו הדרך לקבל עדכונים כל דקה — ה-cron הפנימי של GitHub משמיט רוב ההפעלות.
  repository_dispatch:
    types: [refresh]
  schedule:
    # גיבוי בלבד: ה-cron הפנימי של GitHub לא אמין ומשמיט רוב ההפעלות.
    # העדכון התכוף האמיתי מגיע מ-repository_dispatch (טריגר חיצוני).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-standings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Update standings
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: npm run update

      - name: Commit & push if data changed
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "עדכון טבלה אוטומטי [skip ci]"
            git push
          else
            echo "אין שינוי בנתונים — לא מבצע commit."
          fi
